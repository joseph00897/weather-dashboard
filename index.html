<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Weather Dashboard</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <main class="container">

    <h1>Weather Dashboard</h1>

    <!-- Search Section -->

    <section class="search-section">

      <input
        type="text"
        id="city-input"
        placeholder="Enter city name"
      />

      <button id="search-btn">
        Search
      </button>

    </section>

    <!-- Weather Display -->

    <section
      id="weather-card"
      class="weather-card"
    >

      <h2 id="city-name">
        City Name
      </h2>

      <p id="temperature">
        Temperature:
      </p>

      <p id="humidity">
        Humidity:
      </p>

      <p id="wind-speed">
        Wind Speed:
      </p>

      <p id="description">
        Description:
      </p>

    </section>

  </main>

  <script src="js/script.js"></script>

</body>
</html>
